services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "8010:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn career_ai.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  celery_worker:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "celery -A career_ai worker --loglevel=info --concurrency=2"

  celery_beat:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "celery -A career_ai beat --loglevel=info"

  frontend:
    build:
      context: ./frontend
      # NEXT_PUBLIC_API_URL is empty — production uses relative URLs
      # nginx on the server routes /api/ to the backend
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: always
    ports:
      - "3001:3001"
    command: npm start -- -p 3001

volumes:
  postgres_data:
  media_data:
  static_data:
  redis_data:
