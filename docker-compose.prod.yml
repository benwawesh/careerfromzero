services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8010:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn career_ai.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  celery_worker:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: sh -c "celery -A career_ai worker --loglevel=info --concurrency=2"

  celery_beat:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: sh -c "celery -A career_ai beat --loglevel=info"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=https://careerfromzero.com
    command: npm start -- -p 3001

volumes:
  postgres_data:
  media_data:
  static_data:
  redis_data:
