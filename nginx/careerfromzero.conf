upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3001;
}

server {
    listen 80;
    server_name careerfromzero.com www.careerfromzero.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name careerfromzero.com www.careerfromzero.com;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/careerfromzero.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerfromzero.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # API requests → Django backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Media files
    location /media/ {
        alias /app/media/;
    }

    # Static files (Django admin)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
